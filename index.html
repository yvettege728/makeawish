<style>

let wishes=[],activeFilters=[],fabOpen=false,entryDone=false,entryTimer,windowState={submitTags:[],submitSource:'remote'};const shell=document.getElementById('shell');

function load(){const s=localStorage.getItem('wishes');wishes=s?JSON.parse(s):[...SEED];saveWishes();updateCount();renderFilters();renderWishes();}
function saveWishes(){localStorage.setItem('wishes',JSON.stringify(wishes));}
function updateCount(){document.getElementById('wc').textContent=`${wishes.length} wishes`;}
function renderFilters(){let h=`<button class="fc on" onclick="setFilter(null)">All</button>`;TAGS.forEach(t=>{const a=activeFilters.includes(t.id);h+=`<button class="fc ${a?'on':''}" onclick="setFilter('${t.id}')">${t.label}</button>`;});document.getElementById('fbar').innerHTML=h;}
function renderWishes(){const c=document.getElementById('wishes-list'),f=wishes.filter(w=>activeFilters.length===0||w.tags.some(t=>activeFilters.includes(t)));c.innerHTML=f.length===0?'<div style="text-align:center;padding:40px 20px;color:#aaa;">No wishes to display.</div>':f.map(w=>`<div class="wish-card"><div class="wish-text">${w.wish_text||'(no text)'}</div><div class="wish-meta">#${String(wishes.indexOf(w)+1).padStart(4,'0')} · ${new Date(w.created_at).toLocaleDateString()}</div><div class="wish-tags">${(w.tags||[]).map(t=>`<span class="wish-tag">${TAGS.find(x=>x.id===t)?.label||t}</span>`).join('')}</div></div>`).join('');}
window.setFilter=function(id){activeFilters=!id?[]:(activeFilters.includes(id)?activeFilters.filter(x=>x!==id):[...activeFilters,id]);renderFilters();renderWishes();};
window.toggleFab=function(){fabOpen=!fabOpen;document.getElementById('fabBtn').textContent=fabOpen?'×':'+';document.getElementById('fabMenu').style.display=fabOpen?'flex':'none';};
function openWishList(){dismissEntry(null);setTimeout(()=>{document.getElementById('wishes-list').classList.toggle('show');document.getElementById('entry').style.display='none';},520);}
window.openSubmit=function(source){fabOpen=false;document.getElementById('fabBtn').textContent='+';document.getElementById('fabMenu').style.display='none';windowState.submitTags=[];windowState.submitSource=source;const isOn=source==='on_site';modal(`<div class="md" onclick="event.stopPropagation()"><button class="md-x" onclick="closeModalButton(this)">×</button><h2>${isOn?'Upload your wish card':'What do you wish for?'}</h2><p class="sub">${isOn?'Use a photo of your handwritten card':'Leave a short wish fragment'}</p>${!isOn?'<div class="fs"><label class="fl">Your wish</label><textarea class="ta" id="sm-t" placeholder="I wish..." oninput="smU()"></textarea><div class="cc" id="sm-c">0/500</div></div>':''}<div class="fs"><label class="fl">Tags *</label><div class="tg">${TAGS.map(t=>`<button class="tc" type="button" onclick="smT(this,'${t.id}')">${t.label}</button>`).join('')}</div></div><button class="sb" id="sm-sb" type="button" onclick="smS()">Submit</button></div>`);setTimeout(()=>smCk(),100);};
function modal(html){const w=document.createElement('div');w.className='mo';w.innerHTML=html;const close=()=>w.remove();w._close=close;w.addEventListener('click',e=>{if(e.target===w)close();});document.getElementById('app-modals').appendChild(w);}
window.closeModalButton=function(btn){const w=btn.closest('.mo');if(w)w.remove();};
window.smU=function(){const f=document.getElementById('sm-t');if(f)document.getElementById('sm-c').textContent=`${f.value.length}/500`;smCk();};
window.smT=function(btn,id){const tags=windowState.submitTags||[];if(tags.includes(id)){windowState.submitTags=tags.filter(x=>x!==id);btn.classList.remove('sel');}else if(tags.length<2){windowState.submitTags=[...tags,id];btn.classList.add('sel');}smCk();};
window.smCk=function(){const t=(document.getElementById('sm-t')?.value||'').trim();const hasTags=(windowState.submitTags||[]).length>0;const valid=t.length>0&&hasTags;document.getElementById('sm-sb').disabled=!valid;};
window.smS=function(){const t=(document.getElementById('sm-t')?.value||'').trim();if(!t||!windowState.submitTags.length){alert('Fill in text and tags');return;}const w={id:'u'+Date.now(),created_at:Date.now(),source:windowState.submitSource,wish_text:t,tags:[...windowState.submitTags],photo_url:null,reactions:{pray:0,heart:0,sparkle:0,thought:0}};wishes=[w,...wishes];saveWishes();updateCount();renderWishes();document.querySelector('#app-modals .mo')?.remove();const msg=document.createElement('div');msg.className='msg';msg.textContent='Wish #'+String(wishes.length).padStart(4,'0')+' sealed';document.body.appendChild(msg);setTimeout(()=>msg.remove(),1800);};
function dismissEntry(source){if(entryDone)return;entryDone=true;document.getElementById('entry').classList.add('gone');setTimeout(()=>{document.getElementById('entry').style.display='none';if(source)openSubmit(source);},520);}
window.addEventListener('keydown',e=>{if(e.key==='Escape'){const m=document.querySelector('#app-modals .mo');if(m)m.remove();}});

load();entryTimer=setTimeout(()=>dismissEntry(null),3400);
</script>
</body>
